<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P Jayasuriya & S Janani — A Sacred Union | Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cormorant+SC:wght@500;600&family=Kalam:wght@400;700&family=Noto+Serif+Devanagari:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --maroon:#5c0f1a; --maroon-deep:#3a0910; --red:#8e1f36; --gold:#cf9f3f;
  --gold-light:#f2ce80; --gold-pale:#f7e6b8; --ivory:#fbf3e2; --cream:#f3e6c6;
  --bronze:#8a5a2b; --ink:#2a0a10;
  --font-display:'Cinzel', serif; --font-body:'Cormorant Garamond', serif;
  --font-script:'Kala', cursive; --font-dev:'Noto Serif Devanagari', serif;
  --font-label:'Cormorant SC', serif;
}
body {
  margin:0; font-family:var(--font-body); background:var(--ivory); color:var(--ink);
  background-image: radial-gradient(circle at 50% 50%, rgba(207, 159, 63, 0.05) 0%, transparent 70%), url('https://www.transparenttextures.com/patterns/mandala.png');
}
.deity-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
  opacity: 0.06; pointer-events: none;
  background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Ganesha_statue.jpg/640px-Ganesha_statue.jpg') center/cover no-repeat;
}
section { padding: 4rem 1.25rem; max-width: 1100px; margin: 0 auto; }
h1, h2 { font-family: var(--font-display); color: var(--maroon-deep); }
.gold-btn, .cal-btn {
  display: inline-flex; align-items: center; gap: .6rem;
  font-family: var(--font-label); letter-spacing: .14em; text-transform: uppercase;
  font-size: .85rem; padding: .95em 2em; border-radius: 999px; cursor: pointer;
  text-decoration: none; transition: .25s ease;
}
.gold-btn { color: var(--ink); background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--bronze)); }
.cal-btn { color: var(--maroon-deep); border: 1.5px solid var(--gold); background: transparent; }
.cal-btn:hover { background: var(--gold); color: var(--ink); }
.rsvp-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin: 2rem 0; }
</style>
</head>
<body>

<div class="deity-bg"></div>

<main>
  <section id="welcome">
    <div style="text-align:center;">
      <div style="font-family:var(--font-dev); font-size:2.5rem; color:var(--maroon-deep);">॥ श्री गणेशाय नमः ॥</div>
      <h1>P Jayasuriya & S Janani</h1>
      <p>We lovingly invite you to our wedding.</p>
    </div>
  </section>

  <section id="rsvp">
    <div style="text-align:center;">
      <h2>Kindly Confirm Your Presence</h2>
      <div class="rsvp-actions">
        <!-- Add to Calendar Button -->
        <a class="cal-btn" href="data:text/calendar;charset=utf8,BEGIN:VCALENDAR%0AVERSION:2.0%0APRODID:-//Wedding//Invitation//EN%0ABEGIN:VEVENT%0ASUMMARY:Wedding of Jayasuriya & Janani%0ADTSTART:20261212T051200Z%0ADTEND:20261212T080000Z%0ALOCATION:Chennai, India%0ADESCRIPTION:Join us for the divine wedding ceremony.%0AEND:VEVENT%0AEND:VCALENDAR" download="wedding-invite.ics">
          📅 Add to Calendar
        </a>
        <a class="gold-btn" href="https://forms.gle/your-form-link" target="_blank">RSVP Now</a>
      </div>
    </div>
  </section>
</main>

</body>
</html>
